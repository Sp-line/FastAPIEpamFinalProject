services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - app/.env
    environment:
      - APP_CONFIG__DB__HOST=db
      - APP_CONFIG__S3__ENDPOINT_URL=http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    command: [ "uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./pyproject.toml

  db:
    image: postgres:18
    container_name: epam_pg_db
    env_file:
      - app/.env
    ports:
      - "5432:5432"
    volumes:
      - pg_data_storage:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio
    container_name: epam_minio
    ports:
      - "9000:9000"
    env_file:
      - app/.env
    command: server /data
    volumes:
      - minio_data_storage:/data

  minio-setup:
    image: minio/mc
    container_name: epam_minio_setup
    depends_on:
      - minio
    env_file:
      - app/.env
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set myminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb myminio/$$APP_CONFIG__S3__BUCKET_NAME || true;
      exit 0;
      "

  openmaxio-console:
    image: juacarsud/openmaxio-browser:dev
    container_name: epam_minio_console
    ports:
      - "9090:9090"
    env_file:
      - app/.env
    depends_on:
      - minio

  mailpit:
    image: axllent/mailpit
    container_name: epam_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    env_file:
      - app/.env

volumes:
  pg_data_storage:
  minio_data_storage:
