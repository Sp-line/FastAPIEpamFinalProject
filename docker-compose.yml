services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - app/.env
    environment:
      - APP_CONFIG__DB__HOST=db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./pyproject.toml

  db:
    image: postgres:18
    container_name: epam_pg_db
    env_file:
      - app/.env
    ports:
      - "5432:5432"
    volumes:
      - pg_data_storage:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pg_data_storage:
