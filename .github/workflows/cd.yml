name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger ECS deployment (Smart Check & Wait)
        run: |
          echo "Check cluster status..."
          
          CLUSTER_STATUS=$(aws ecs describe-clusters \
            --clusters epam-prod-cluster \
            --query "clusters[0].status" \
            --output text)
          
          if [ "$CLUSTER_STATUS" == "ACTIVE" ]; then
            echo "Cluster active. Start service update..."
            
            aws ecs update-service \
              --cluster epam-prod-cluster \
              --service epam-prod-service \
              --force-new-deployment > /dev/null
              
            echo "Update command sent! Waiting for ECS to provision new tasks..."
            echo "(This usually takes 2-5 minutes. Please wait...)"
            
            aws ecs wait services-stable \
              --cluster epam-prod-cluster \
              --services epam-prod-service
              
            echo "Deploy successful and verified!"
            
          else
            echo "Cluster not active (Status: $CLUSTER_STATUS)."
            echo "The CI pipeline built and stored the image, but the infrastructure is down."
            echo "Skipping deployment. Pipeline will safely exit without an error."
            exit 0
          fi