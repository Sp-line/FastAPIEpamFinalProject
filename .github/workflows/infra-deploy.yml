name: Infrastructure Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/main.yml'
  workflow_dispatch:

jobs:
  deploy-infra:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to AWS CloudFormation
        run: |
          echo "Create or update infrastructure..."
          
          aws cloudformation deploy \
            --template-file infrastructure/main.yml \
            --stack-name epam-prod-stack \
            --parameter-overrides DbSecretArn=${{ secrets.DB_SECRET_ARN }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
            
          echo "Infrastructure successfully updated!"